<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Pakar AI</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #333;
        }

        p {
            text-align: center;
            color: #777;
            margin-bottom: 15px;
        }

        .list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 10px;
        }

        label {
            display: block;
            padding: 6px;
            border-radius: 6px;
            transition: 0.2s;
            cursor: pointer;
        }

        label:hover {
            background: #f1f7ff;
        }

        input[type="checkbox"] {
            margin-right: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(135deg, #3498db, #6dd5fa);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            background: linear-gradient(135deg, #2980b9, #57c1eb);
        }

        #hasil {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        /* scrollbar */
        .list::-webkit-scrollbar {
            width: 6px;
        }

        .list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

    </style>
</head>

<body>

<div class="container">
<div class="box">

<h2>💻 Sistem Pakar</h2>
<p>Deteksi Kerusakan Komputer</p>

<div class="list">

<label><input type="checkbox" value="B1"> Tidak ada gambar</label>
<label><input type="checkbox" value="B2"> Garis monitor</label>
<label><input type="checkbox" value="B3"> Tidak ada BIOS</label>
<label><input type="checkbox" value="B4"> Error BIOS</label>
<label><input type="checkbox" value="B5"> Alarm BIOS</label>
<label><input type="checkbox" value="B6"> Suara HDD</label>
<label><input type="checkbox" value="B7"> Hang</label>
<label><input type="checkbox" value="B8"> Scandisk</label>
<label><input type="checkbox" value="B9"> Error grafis</label>
<label><input type="checkbox" value="B10"> Driver tidak terdeteksi</label>
<label><input type="checkbox" value="B11"> Restart</label>
<label><input type="checkbox" value="B12"> Blue screen</label>
<label><input type="checkbox" value="B13"> Tidak ada suara</label>
<label><input type="checkbox" value="B14"> Error audio</label>
<label><input type="checkbox" value="B15"> Error HDD</label>
<label><input type="checkbox" value="B16"> Tidak hidup</label>
<label><input type="checkbox" value="B17"> Mati tiba-tiba</label>
<label><input type="checkbox" value="B18"> Memory kurang</label>
<label><input type="checkbox" value="B19"> Lambat</label>
<label><input type="checkbox" value="B20"> Grafik berat</label>
<label><input type="checkbox" value="B21"> Tidak terdeteksi BIOS</label>
<label><input type="checkbox" value="B22"> Deteksi BIOS salah</label>
<label><input type="checkbox" value="B23"> Sebagian mati</label>
<label><input type="checkbox" value="B24"> Keyboard mati</label>
<label><input type="checkbox" value="B25"> Mouse mati</label>

</div>

<button onclick="diagnosa()">🔍 Diagnosa Sekarang</button>

<div id="hasil"></div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
