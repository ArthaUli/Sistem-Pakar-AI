<!DOCTYPE html>
<html>
<head>
    <title>Sistem Pakar</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: gray;
        }

        .list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
        }

        label {
            display: block;
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
        }

        button:hover {
            background: #2980b9;
        }

        #hasil {
            margin-top: 15px;
            padding: 10px;
            background: #dff0d8;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Sistem Pakar</h2>
<p>Deteksi Kerusakan Komputer</p>

<div class="list">

<label><input type="checkbox" value="B1"> B1 - Tidak ada gambar</label>
<label><input type="checkbox" value="B2"> B2 - Garis monitor</label>
<label><input type="checkbox" value="B3"> B3 - Tidak ada BIOS</label>
<label><input type="checkbox" value="B4"> B4 - Error BIOS</label>
<label><input type="checkbox" value="B5"> B5 - Alarm BIOS</label>
<label><input type="checkbox" value="B6"> B6 - Suara HDD</label>
<label><input type="checkbox" value="B7"> B7 - Hang</label>
<label><input type="checkbox" value="B8"> B8 - Scandisk</label>
<label><input type="checkbox" value="B9"> B9 - Error grafis</label>
<label><input type="checkbox" value="B10"> B10 - Driver tidak terdeteksi</label>
<label><input type="checkbox" value="B11"> B11 - Restart</label>
<label><input type="checkbox" value="B12"> B12 - Blue screen</label>
<label><input type="checkbox" value="B13"> B13 - Tidak ada suara</label>
<label><input type="checkbox" value="B14"> B14 - Error audio</label>
<label><input type="checkbox" value="B15"> B15 - Error HDD</label>
<label><input type="checkbox" value="B16"> B16 - Tidak hidup</label>
<label><input type="checkbox" value="B17"> B17 - Mati tiba-tiba</label>
<label><input type="checkbox" value="B18"> B18 - Memory kurang</label>
<label><input type="checkbox" value="B19"> B19 - Lambat</label>
<label><input type="checkbox" value="B20"> B20 - Grafik berat</label>
<label><input type="checkbox" value="B21"> B21 - Tidak terdeteksi BIOS</label>
<label><input type="checkbox" value="B22"> B22 - Deteksi BIOS salah</label>
<label><input type="checkbox" value="B23"> B23 - Sebagian mati</label>
<label><input type="checkbox" value="B24"> B24 - Keyboard mati</label>
<label><input type="checkbox" value="B25"> B25 - Mouse mati</label>

</div>

<button onclick="diagnosa()">Diagnosa</button>

<div id="hasil"></div>

</div>

<script src="script.js"></script>

</body>
</html>
